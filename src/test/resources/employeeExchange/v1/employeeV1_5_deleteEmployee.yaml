id: "Employee"
apis:
 - name: V1    
   restEndpoints:
    - name: "deleteEmployee"
      description: "Delete an employee"
      httpMethod: "DELETE"
      docUrl: "https://www.example.com/docs/employee/delete"
      url: "/employee"
      urlParameters: "/${id}"
      request:
       name: "id"
       type: INT
       description: "Employee ID"
       sampleValue: ${demo.config.employeeId}