name: "Employee"
apis:
 - name: V1    
   restEndpoints:
    - name: "getEmployee"
      description: "Get employee details by ID"
      httpMethod: "GET"
      docUrl: "https://www.example.com/docs/employee/get"
      url: "/employee"
      urlParameters: "/${id}"
      request:
       name: "id"
       type: INT
       description: "Employee ID"
       sampleValue: 1
      response:
       objectName: "Employee"
       type: OBJECT
       properties:
        - name: "id"
          type: INT
          description: "Employee ID"
          sampleValue: 1
        - name: "firstName"
          type: STRING
          description: "Employee First Name"
          sampleValue: "John"
        - name: "lastName"
          type: STRING
          description: "Employee last lame"
          sampleValue: "Doe"
        - name: "profile"
          type: STRING
          description: "Employee profile. Can be 'regular' or 'admin'"
          sampleValue: "REGULAR"